name: CI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after building'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-darwin:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            pkg: darwin-x64
          - os: macos-latest
            arch: arm64
            pkg: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: scripts/build-mac.sh ${{ matrix.arch }} ${{ matrix.pkg }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: binaries/${{ matrix.pkg }}/

  build-win:
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: win32-x64
            arch: x64
          - pkg: win32-arm64
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - name: Build
        shell: bash
        env:
          MSYS2_ARG_CONV_EXCL: "*"
        run: ./scripts/build-win.sh ${{ matrix.pkg }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: binaries/${{ matrix.pkg }}/bin/trayconsole.exe

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            pkg: linux-x64
          - os: ubuntu-24.04-arm
            pkg: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build
        run: scripts/build-linux.sh ${{ matrix.pkg }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: binaries/${{ matrix.pkg }}/

  publish:
    if: ${{ inputs.publish }}
    needs: [build-darwin, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            mkdir -p binaries/$pkg/bin
            cp artifacts/$pkg/bin/* binaries/$pkg/bin/
            chmod +x binaries/$pkg/bin/*
          done
          for pkg in win32-x64 win32-arm64; do
            mkdir -p binaries/$pkg/bin
            cp artifacts/$pkg/*.exe binaries/$pkg/bin/
          done
          echo "Binaries:"
          find binaries -type f | sort

      - name: Build TypeScript
        run: npm ci && npm run build

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            echo "Publishing @agent-orcha/trayconsole-$pkg..."
            (cd binaries/$pkg && npm publish --provenance --access public)
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
